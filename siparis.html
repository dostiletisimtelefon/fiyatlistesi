<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sipariş Sayfası</title>
<style>
:root{
  --bg:#0f1320;
  --ink:#0f1a2a;
  --accent:#25D366;
  --radius:16px;
}

html,body{
  max-width:100%;
  overflow-x:hidden;
}

body{
  margin:0;
  font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1200px 600px at 80% -10%,rgba(46,111,242,.15),transparent 60%),
    radial-gradient(900px 500px at -10% 20%,rgba(37,211,102,.1),transparent 60%),
    var(--bg);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:12px;
  min-height:100svh;
  min-height:100dvh;
  box-sizing:border-box;
}

.shell{
  width:min(1124px,96%);
  background:linear-gradient(180deg,#fff,#fafbff);
  border-radius:16px;
  border:1px solid #e9eef6;
  box-shadow:0 8px 32px rgba(0,0,0,.08);
  display:flex;
  flex-direction:column;
  overflow:auto;
}

.hero{
  padding:10px;
  border-bottom:1px solid #eef1f6;
}

.hero img{
  width:100%;
  height:auto;
  max-height:165px;
  object-fit:contain;
  border-radius:12px;
  display:block;
}

.inner{
  padding:12px 14px;
  display:grid;
  gap:10px;
}

.product-card{
  background:#fff;
  border:1px solid #e9eef6;
  border-radius:12px;
  padding:9px;
}

.product-card h3{
  margin:0 0 4px;
  font-size:15px;
}

.product-card p{
  margin:3px 0;
  font-size:13.5px;
}

.price{
  color:#e25342;
  font-weight:700;
}

.specs-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  background:#fff;
  border:1px solid #e9eef6;
  border-radius:12px;
  padding:8px;
}

.spec-item{
  display:flex;
  align-items:flex-start;
  gap:7px;
  background:#f8fafc;
  border:1px solid #eef1f6;
  border-radius:10px;
  padding:6px 7px;
  font-size:12.8px;
  min-height:50px;
  box-sizing:border-box;
  transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
}

.spec-item:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 10px rgba(0,0,0,.05);
  background:#fbfdff;
}

.spec-item.wide{
  grid-column:1 / -1;
  min-height:56px;
}

.spec-item i{
  font-size:16px;
  line-height:1.2;
  flex-shrink:0;
  margin-top:1px;
}

.spec-text{
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
  text-align:left;
  flex:1;
}

.spec-label{
  display:block;
  font-weight:700;
  font-size:12px;
  color:#111827;
  margin-bottom:2px;
  line-height:1.2;
}

.spec-value{
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
  line-height:1.3;
  color:#374151;
  font-size:12.5px;
  word-break:break-word;
}

.spec-item.wide .spec-value{
  -webkit-line-clamp:2;
}

.people{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.personel{
  display:grid;
  grid-template-columns:58px 1fr;
  align-items:center;
  gap:8px;
  background:#fff;
  border:1px solid #e9eef6;
  border-radius:12px;
  padding:7px;
}

.brand-square{
  width:58px;
  height:58px;
  border:1px solid #e9eef6;
  border-radius:10px;
  display:grid;
  place-items:center;
  overflow:hidden;
  padding:6px;
  background:#fff;
}

.brand-square img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.info{
  text-align:center;
}

.personel h2{
  margin:0;
  font-size:15px;
}

.phone-number{
  margin:4px 0 8px;
  font-size:13px;
  color:#39455a;
}

.whatsapp-button{
  background:var(--accent);
  color:#fff;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:5px 9px;
  border-radius:9px;
  font-size:12px;
  box-shadow:0 2px 6px rgba(37,211,102,.25);
}

.whatsapp-button img{
  width:16px;
  height:16px;
}

.brands{
  border-top:1px solid #eef1f6;
  background:#fbfcff;
  padding:7px;
}

.brand-row{
  display:flex;
  justify-content:center;
  margin-bottom:6px;
}

.brand-row h4{
  margin:0;
  font-size:11px;
}

.logo-slider{
  overflow:hidden;
}

.logo-track{
  display:flex;
  gap:20px;
  width:max-content;
  animation:scroll 18s linear infinite;
}

.logo-track img{
  height:18px;
}

@keyframes scroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

.foot{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 9px;
  border-top:1px solid #eef1f6;
  background:#ffffffd8;
  color:#5b677a;
  font-size:11px;
}

@media (max-width:768px){
  .people{
    grid-template-columns:1fr;
  }
}

@media (max-width:560px){
  .hero{
    padding:7px;
  }

  .hero img{
    max-height:118px;
  }

  .inner{
    padding:9px 10px;
    gap:8px;
  }

  .product-card{
    padding:8px;
  }

  .product-card h3{
    font-size:14px;
  }

  .product-card p{
    font-size:13px;
  }

  .specs-grid{
    grid-template-columns:1fr 1fr;
    gap:7px;
    padding:7px;
  }

  .spec-item{
    min-height:54px;
    padding:6px 7px;
  }

  .spec-item.wide{
    min-height:52px;
  }

  .spec-label{
    font-size:11px;
  }

  .spec-value{
    font-size:11.8px;
    -webkit-line-clamp:2;
  }

  .spec-item.wide .spec-value{
    -webkit-line-clamp:1;
  }

  .people{
    gap:8px;
  }

  .personel{
    grid-template-columns:52px 1fr;
    padding:7px;
    gap:7px;
  }

  .brand-square{
    width:52px;
    height:52px;
  }

  .personel h2{
    font-size:13.5px;
  }

  .phone-number{
    font-size:12px;
    margin:3px 0 5px;
  }

  .whatsapp-button{
    padding:5px 8px;
    font-size:11.5px;
  }

  .whatsapp-button img{
    width:15px;
    height:15px;
  }

  .foot{
    font-size:10.5px;
    padding:6px 8px;
  }
}

/* --- COMPACT modu (URL: &compact=1) --- */
.shell.compact .hero{
  padding:8px;
}

.shell.compact .hero img{
  max-height:130px;
}

.shell.compact .inner{
  padding:10px;
  gap:10px;
}

.shell.compact .product-card{
  padding:10px;
}

.shell.compact .product-card h3{
  font-size:16px;
}

.shell.compact .product-card p{
  font-size:14px;
}

.shell.compact .specs-grid{
  gap:8px;
  padding:8px;
}

.shell.compact .spec-item{
  padding:7px 8px;
  font-size:12.5px;
  min-height:58px;
}

.shell.compact .spec-item.wide{
  min-height:60px;
}

.shell.compact .spec-item i{
  font-size:15px;
}

.shell.compact .spec-label{
  font-size:11.8px;
}

.shell.compact .spec-value{
  font-size:12px;
  -webkit-line-clamp:2;
}

.shell.compact .spec-item.wide .spec-value{
  -webkit-line-clamp:2;
}

.shell.compact .personel{
  grid-template-columns:56px 1fr;
  padding:8px;
}

.shell.compact .brand-square{
  width:56px;
  height:56px;
}

.shell.compact .personel h2{
  font-size:14px;
}

.shell.compact .phone-number{
  font-size:12.5px;
  margin:4px 0 6px;
}

.shell.compact .whatsapp-button{
  padding:5px 8px;
  font-size:12px;
}

.shell.compact .logo-track img{
  height:16px;
}

.shell.compact .foot{
  font-size:11px;
  padding:6px 10px;
}
</style>
</head>
<body>
<div class="shell" id="shell">
  <div class="hero">
    <img src="https://raw.githubusercontent.com/dostiletisimtelefon/fiyatlistesi/refs/heads/main/dostyenilogo.jpg" alt="Dost İletişim">
  </div>

  <div class="inner">
    <div class="product-card">
      <h3 id="product_name">Ürün :</h3>
      <p id="product_features" class="price">Ram Ve Hafıza :</p>
      <p class="price" id="product_price">Fiyat:</p>
    </div>

    <div class="specs-grid" id="specs_grid"></div>

    <div class="people">
      <div class="personel">
        <div class="brand-square">
          <img src="https://raw.githubusercontent.com/dostiletisimtelefon/fiyatlistesi/refs/heads/main/dost.jpg" alt="Dost İletişim">
        </div>
        <div class="info">
          <h2>Miskin Adak</h2>
          <p class="phone-number">0535 641 9868</p>
          <a id="whatsappButton1" href="#" class="whatsapp-button" target="_blank" rel="noopener">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="">WhatsApp ile Sipariş Ver
          </a>
        </div>
      </div>

      <div class="personel">
        <div class="brand-square">
          <img src="https://raw.githubusercontent.com/dostiletisimtelefon/fiyatlistesi/refs/heads/main/dost.jpg" alt="Dost İletişim">
        </div>
        <div class="info">
          <h2>Murat Uğur</h2>
          <p class="phone-number">0536 997 3191</p>
          <a id="whatsappButton2" href="#" class="whatsapp-button" target="_blank" rel="noopener">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="">WhatsApp ile Sipariş Ver
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="brands">
    <div class="brand-row"><h4>Çalıştığımız Markalar</h4></div>
    <div class="logo-slider">
      <div class="logo-track">
        <img src="https://upload.wikimedia.org/wikipedia/commons/archive/6/61/20210930181848%21Samsung_old_logo_before_year_2015.svg" alt="Samsung">
        <img src="https://wp.logos-download.com/wp-content/uploads/2016/05/Xiaomi_Logo_2019-700x211.png" alt="Xiaomi">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Infinix_logo.svg" alt="Infinix">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Tecno_Mobile_logo.svg" alt="Tecno">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
        <img src="https://cdn.tradetracker.net/cz/campaign_image_rectangle/30034.png" alt="Redmagic">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/f6/Nubia_logo.svg" alt="Nubia">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/f8/OP_LU_Reg_1L_RGB_red_copy-01.svg" alt="OnePlus">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/ea/Apple_iPhone.svg" alt="iPhone">
      </div>
    </div>
  </div>

  <div class="foot">
    <span>Güvenli ve hızlı sipariş</span>
    <span>Fiyatlar kura göre değişebilir</span>
  </div>
</div>

<script>
function qpRaw(n){
  return new URL(location.href).searchParams.get(n) || "";
}

function qpDec(n){
  let v = qpRaw(n).replace(/\+/g," ").trim();
  for(let i=0;i<3;i++){
    try{
      if(/%[0-9a-fA-F]{2}/.test(v)) v = decodeURIComponent(v);
    }catch(e){
      break;
    }
  }
  return v.trim();
}

function isSoldOut(v){
  return String(v || "").toLowerCase().includes("tükendi");
}

function parseLocalizedNumber(v){
  if(!v) return NaN;
  v = String(v).trim();

  if(/^\d{1,3}(\.\d{3})+(,\d+)?$/.test(v)){
    v = v.replace(/\./g,'').replace(',', '.');
  }else if(/^\d{1,3}(,\d{3})+(\.\d+)?$/.test(v)){
    v = v.replace(/,/g,'');
  }else{
    v = v.replace(',', '.');
  }

  return parseFloat(v);
}

function formatUSD(v){
  if(!v) return "";
  const n = parseLocalizedNumber(v);
  if(isNaN(n)) return String(v);
  return n.toLocaleString("tr-TR", {
    minimumFractionDigits:0,
    maximumFractionDigits:(n % 1 === 0 ? 0 : 3)
  }) + " $";
}

function formatTL(v){
  if(!v) return "";
  const n = parseLocalizedNumber(v);
  if(isNaN(n)) return String(v);
  return n.toLocaleString("tr-TR", {
    minimumFractionDigits:0,
    maximumFractionDigits:(n % 1 === 0 ? 0 : 3)
  }) + " TL";
}

function normalizeKey(s){
  return (s || "")
    .toLocaleLowerCase("tr")
    .replaceAll("ı","i")
    .replaceAll("İ","i")
    .replaceAll("ş","s")
    .replaceAll("ç","c")
    .replaceAll("ğ","g")
    .replaceAll("ö","o")
    .replaceAll("ü","u")
    .replace(/[^\p{L}]/gu,"")
    .trim();
}

const SPEC_KEYS_TR = [
  "İşlemci","Ekran","Kamera","Performans","Gpu","GPU","Batarya","Boyutlar","Sensörler","Sensorler",
  "CPU","Display","Camera","Battery","Dimensions"
];

const SPEC_RE = new RegExp(
  "(" + SPEC_KEYS_TR.join("|") + ")\\s*:\\s*([^]+?)(?=(?:,\\s*(?:" + SPEC_KEYS_TR.join("|") + ")\\s*:)|$)",
  "gi"
);

function parseSpecs(raw){
  const out = {};
  if(!raw) return out;

  let m;
  while((m = SPEC_RE.exec(raw)) !== null){
    const kRaw = m[1] || "";
    let v = (m[2] || "")
      .trim()
      .replace(/^[,\s]+|[,\s]+$/g,"")
      .replace(/\s+/g," ");

    let k = normalizeKey(kRaw);

    if(k.includes("islemci") || k.includes("soc") || k.includes("processor") || k === "cpu") k = "islemci";
    else if(k.includes("ekran") || k.includes("display")) k = "ekran";
    else if(k.includes("kamera") || k.includes("camera")) k = "kamera";
    else if(k === "gpu" || k.includes("grafik")) k = "gpu";
    else if(k.includes("batarya") || k.includes("pil") || k.includes("battery")) k = "batarya";
    else if(k.includes("boyut") || k.includes("dimension")) k = "boyutlar";
    else if(k.includes("performans")) k = "performans";

    out[k] = v;
  }

  return out;
}

function shortenDimensions(v){
  return v ? String(v).replace(/\s*\([^)]*\)\s*$/,"").trim() : v;
}

function ellipsize(s,m){
  s = String(s || "").trim();
  return s.length > m ? s.slice(0,m - 1) + "…" : s;
}

function renderSpecsGrid(specs){
  const order = [
    {key:"islemci",   icon:"🧠", label:"İşlemci", wide:true},
    {key:"ekran",     icon:"📱", label:"Ekran", wide:true},
    {key:"kamera",    icon:"📸", label:"Kamera", wide:false},
    {key:"gpu",       icon:"🎮", label:"GPU", wide:false},
    {key:"batarya",   icon:"🔋", label:"Batarya", wide:false},
    {key:"boyutlar",  icon:"📏", label:"Boyutlar", wide:false}
  ];

  const grid = document.getElementById("specs_grid");
  grid.innerHTML = "";
  let found = 0;

  order.forEach(f => {
    let val = specs[f.key];
    if(!val) return;

    let clean = String(val).replace(/\s+/g," ").trim();

    if(f.key === "boyutlar") clean = shortenDimensions(clean);

    let display = clean;

    if(f.key === "islemci")  display = ellipsize(display, 70);
    if(f.key === "ekran")    display = ellipsize(display, 85);
    if(f.key === "kamera")   display = ellipsize(display, 70);
    if(f.key === "gpu")      display = ellipsize(display, 42);
    if(f.key === "batarya")  display = ellipsize(display, 42);
    if(f.key === "boyutlar") display = ellipsize(display, 48);

    grid.insertAdjacentHTML("beforeend", `
      <div class="spec-item ${f.wide ? 'wide' : ''}" title="${clean}">
        <i>${f.icon}</i>
        <div class="spec-text">
          <span class="spec-label">${f.label}</span>
          <span class="spec-value">${display}</span>
        </div>
      </div>
    `);

    found++;
  });

  grid.hidden = !found;
}

function hydrate(){
  const product  = qpDec("product");
  const features = qpDec("features");
  const usdRaw   = qpDec("price_usd");
  const tlRaw    = qpDec("price_tl");
  const specsRaw = qpDec("specs");

  const sold = isSoldOut(usdRaw) || isSoldOut(tlRaw);
  const priceText = sold
    ? "Tükendi"
    : [formatUSD(usdRaw), formatTL(tlRaw)].filter(Boolean).join(" / ");

  document.getElementById("product_name").textContent = "Ürün : " + (product || "");
  document.getElementById("product_features").textContent = "Ram Ve Hafıza : " + (features || "");
  document.getElementById("product_price").textContent = "Fiyat: " + priceText;

  renderSpecsGrid(parseSpecs(specsRaw));

  const lines = ["Sipariş vermek istiyorum."];
  if(product) lines.push(`Ürün: ${product}`);
  if(features) lines.push(`Ram Ve Hafıza: ${features}`);

  if(!sold){
    const u = usdRaw ? formatUSD(usdRaw) : "";
    const t = tlRaw ? formatTL(tlRaw) : "";
    if(u) lines.push(`Fiyat (USD): ${u}`);
    if(t) lines.push(`Fiyat (TL): ${t}`);
  }else{
    lines.push("Durum: Tükendi");
  }

  const enc = encodeURIComponent(lines.join("\n"));
  document.getElementById("whatsappButton1").href = "https://wa.me/905356419868?text=" + enc;
  document.getElementById("whatsappButton2").href = "https://wa.me/905369973191?text=" + enc;

  const q = new URL(location.href).searchParams;
  if(q.get("compact") === "1"){
    document.getElementById("shell").classList.add("compact");
  }
}

document.addEventListener("DOMContentLoaded", hydrate);
</script>
</body>
</html>
