<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sipariş</title>

<style>
:root{
  --bg:#0f1320;
  --accent:#25D366;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  display:flex;
  justify-content:center;
  padding:12px;
}

.shell{
  width:100%;
  max-width:500px;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
}

/* HEADER */
.hero img{
  width:100%;
  max-height:110px;
  object-fit:contain;
}

/* GENEL */
.inner{
  padding:8px 10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* ÜRÜN */
.product-card{
  border:1px solid #eee;
  border-radius:10px;
  padding:8px;
}

.product-card h3{
  font-size:15px;
  margin:0 0 4px;
}

.product-card p{
  margin:2px 0;
  font-size:13px;
  color:#e25342;
  font-weight:600;
}

/* SPEC GRID */
.specs-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.spec-item{
  background:#f5f6f8;
  border-radius:8px;
  padding:6px;
  display:flex;
  gap:6px;
  font-size:12px;
  min-height:50px;
}

.spec-item.wide{
  grid-column:1 / -1;
}

.spec-item i{
  font-size:14px;
}

.spec-label{
  font-weight:700;
  font-size:11px;
}

.spec-value{
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* PERSONEL */
.personel{
  display:grid;
  grid-template-columns:50px 1fr;
  gap:8px;
  padding:8px;
  border:1px solid #eee;
  border-radius:10px;
}

.brand-square{
  width:50px;
  height:50px;
}

.brand-square img{
  width:100%;
}

.info{
  text-align:center;
}

.info h2{
  margin:0;
  font-size:14px;
}

.phone-number{
  font-size:12px;
}

.whatsapp-button{
  background:var(--accent);
  color:#fff;
  padding:5px 8px;
  border-radius:8px;
  font-size:12px;
  display:inline-block;
  margin-top:4px;
  text-decoration:none;
}

/* FOOT */
.foot{
  display:flex;
  justify-content:space-between;
  font-size:10px;
  padding:6px 8px;
}
</style>
</head>

<body>

<div class="shell">

<div class="hero">
<img src="https://raw.githubusercontent.com/dostiletisimtelefon/fiyatlistesi/refs/heads/main/dostyenilogo.jpg">
</div>

<div class="inner">

<div class="product-card">
<h3 id="product_name"></h3>
<p id="product_features"></p>
<p id="product_price"></p>
</div>

<div class="specs-grid" id="specs_grid"></div>

<div class="personel">
<div class="brand-square">
<img src="https://raw.githubusercontent.com/dostiletisimtelefon/fiyatlistesi/refs/heads/main/dost.jpg">
</div>
<div class="info">
<h2>Miskin Adak</h2>
<div class="phone-number">0535 641 9868</div>
<a id="w1" class="whatsapp-button">WhatsApp</a>
</div>
</div>

<div class="personel">
<div class="brand-square">
<img src="https://raw.githubusercontent.com/dostiletisimtelefon/fiyatlistesi/refs/heads/main/dost.jpg">
</div>
<div class="info">
<h2>Murat Uğur</h2>
<div class="phone-number">0536 997 3191</div>
<a id="w2" class="whatsapp-button">WhatsApp</a>
</div>
</div>

</div>

<div class="foot">
<span>Güvenli sipariş</span>
<span>Fiyatlar değişebilir</span>
</div>

</div>

<script>
function qp(n){
  return decodeURIComponent(new URL(location.href).searchParams.get(n) || "");
}

function parseSpecs(text){
  const keys=["İşlemci","Ekran","Kamera","GPU","Batarya","Boyutlar"];
  const out={};
  keys.forEach(k=>{
    const r=new RegExp(k+":(.*?)(?=,\\s*[A-ZİĞÜŞÇ]|$)","i");
    const m=text.match(r);
    if(m) out[k]=m[1].trim();
  });
  return out;
}

function addSpec(icon,label,val,wide=false){
  document.getElementById("specs_grid").innerHTML+=`
  <div class="spec-item ${wide?"wide":""}">
    <i>${icon}</i>
    <div>
      <div class="spec-label">${label}</div>
      <div class="spec-value">${val}</div>
    </div>
  </div>`;
}

function init(){
  const product=qp("product");
  const features=qp("features");
  const usd=qp("price_usd");
  const tl=qp("price_tl");
  const specs=qp("specs");

  document.getElementById("product_name").innerText="Ürün : "+product;
  document.getElementById("product_features").innerText="Ram: "+features;
  document.getElementById("product_price").innerText=usd+"$ / "+tl+" TL";

  const s=parseSpecs(specs);

  addSpec("🧠","İşlemci",s["İşlemci"],true);
  addSpec("📱","Ekran",s["Ekran"],true);
  addSpec("📸","Kamera",s["Kamera"]);
  addSpec("🎮","GPU",s["GPU"]);
  addSpec("🔋","Batarya",s["Batarya"]);
  addSpec("📏","Boyutlar",s["Boyutlar"]);

  const msg=encodeURIComponent(product+" sipariş");
  document.getElementById("w1").href="https://wa.me/905356419868?text="+msg;
  document.getElementById("w2").href="https://wa.me/905369973191?text="+msg;
}

init();
</script>

</body>
</html>
